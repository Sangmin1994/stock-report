name: Daily Stock Report

on:
  schedule:
    - cron: '0 21 * * *'    # 매일 06:00 KST (= 21:00 UTC)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google service account key
        run: echo '${{ secrets.GSHEET_KEY_JSON }}' > stately-transit-494900-i8-524c44e2e62d.json

      - name: Run notebook
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_KEY_FILE: stately-transit-494900-i8-524c44e2e62d.json
          TOSS_CLIENT_ID: ${{ secrets.TOSS_CLIENT_ID }}
          TOSS_CLIENT_SECRET: ${{ secrets.TOSS_CLIENT_SECRET }}
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=3600 \
            --ExecutePreprocessor.kernel_name=python3 \
            --output scanner_portpolio_v4.ipynb \
            scanner_portpolio_v4.ipynb

      - name: Copy report to fixed filename
        run: |
          DATE=$(date +%Y%m%d)
          cp report_${DATE}.html report.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=report.html">
          </head>
          <body><a href="report.html">최신 리포트 보기</a></body>
          </html>
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add report.html index.html
          git add sector_map*.json 2>/dev/null || true
          git add sector_data_cache.json 2>/dev/null || true
          git add company_names.json 2>/dev/null || true
          git add company_domains.json 2>/dev/null || true
          git add toss_selftest.txt 2>/dev/null || true
          git add signal_log.csv signal_log_summary.txt 2>/dev/null || true
          git add constituents_cache.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "report: $(date +%Y-%m-%d)"
          # 노트북 재실행으로 변경된 tracked 파일 되돌림 (커밋 대상 아님 → rebase 차단 방지)
          git checkout -- . 2>/dev/null || true
          # 원격이 앞서 있을 수 있으므로 rebase 후 push, 경합 시 재시도
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --autostash origin/main || { git rebase --abort 2>/dev/null || true; sleep 5; continue; }
            if git push origin HEAD:main; then
              echo "push 성공 (시도 $i)"; exit 0
            fi
            echo "push 경합 — 재시도 $i"; sleep 5
          done
          echo "push 최종 실패"; exit 1
